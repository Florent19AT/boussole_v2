<title>Boussole - Guide du CDI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender:#EDE7F6;
    --mint:#E3F2E1;
    --peach:#FFE8D6;
    --ink:#3A3845;
    --muted:#6B6877;
    --white:#FFFFFF;
    --accent:#8B7FD1;
    --accent-dark:#6F62B8;
    --radius-lg:24px;
    --radius-md:16px;
    --radius-pill:999px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(160deg,var(--lavender) 0%, var(--mint) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    color:var(--ink);
  }
  .chat-card{
    width:100%;
    max-width:500px;
    height:min(700px, 94vh);
    background:var(--white);
    border-radius:var(--radius-lg);
    box-shadow:0 12px 32px rgba(58,56,69,0.14);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .chat-header{
    background:linear-gradient(120deg, var(--accent) 0%, #A89AE0 100%);
    color:#fff;
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .chat-header .icon{width:38px;height:38px;flex-shrink:0;}
  .chat-header h1{font-family:'Baloo 2',cursive;font-size:20px;margin:0;font-weight:700;}
  .chat-header p{margin:2px 0 0;font-size:12.5px;opacity:0.92;}
  .chat-messages{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .message{
    max-width:86%;
    padding:10px 14px;
    border-radius:var(--radius-md);
    font-size:14px;
    line-height:1.55;
  }
  .message.bot{
    align-self:flex-start;
    background:var(--mint);
    border-bottom-left-radius:4px;
  }
  .message.user{
    align-self:flex-end;
    background:var(--peach);
    border-bottom-right-radius:4px;
  }
  .message strong{color:var(--accent-dark);}
  .message a{color:var(--accent-dark);text-decoration:underline;}
  .message.typing{display:flex;gap:4px;align-items:center;padding:14px;}
  .message.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite ease-in-out;}
  .message.typing span:nth-child(2){animation-delay:0.15s;}
  .message.typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-4px);opacity:1;}}
  @media (prefers-reduced-motion: reduce){
    .message.typing span{animation:none;opacity:0.7;}
    .quick-reply{transition:none;}
  }
  .quick-replies{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:0 18px 14px;
    flex-shrink:0;
  }
  .quick-reply{
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:8px 14px;
    border-radius:var(--radius-pill);
    border:1.5px solid var(--accent);
    background:#fff;
    color:var(--accent-dark);
    cursor:pointer;
    transition:transform 0.15s ease, background 0.15s ease;
  }
  .quick-reply:hover{background:var(--lavender);transform:translateY(-1px);}
  .quick-reply:focus-visible{outline:2px solid var(--accent-dark);outline-offset:2px;}
  .chat-input-area{
    border-top:1px solid #EFEAF7;
    padding:12px 14px;
    display:flex;
    gap:8px;
    flex-shrink:0;
  }
  .chat-input-area input{
    flex:1;
    border:1.5px solid #E3DEF2;
    border-radius:var(--radius-pill);
    padding:10px 16px;
    font-size:14px;
    font-family:inherit;
    outline:none;
  }
  .chat-input-area input:focus{border-color:var(--accent);}
  .chat-input-area button{
    width:42px;height:42px;flex-shrink:0;
    border-radius:50%;
    border:none;
    background:var(--accent);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  .chat-input-area button:hover{background:var(--accent-dark);}
  .chat-input-area button:focus-visible{outline:2px solid var(--accent-dark);outline-offset:2px;}
  @media (max-width:480px){
    body{padding:0;}
    .chat-card{height:100vh;border-radius:0;max-width:100%;}
  }
</style>
</head>

// ── GUIDAGE THÉMATIQUE (documentaires + fiction) ────────────────────────────

function domainForCode(code){
  const hundred = code[0] + '00';
  const entry = COTES.documentaires.find(c => c.code === hundred);
  return entry ? entry.label : '';
}

// ── TOLÉRANCE AUX FAUTES DE FRAPPE / ORTHOGRAPHE ────────────────────────────
// Public collégien : "écologi", "fantastik"... doivent quand même être reconnus.
// On calcule une distance d'édition (Levenshtein) et on tolère quelques
// caractères d'écart selon la longueur du mot, sans jamais le signaler à l'élève.

function levenshtein(a, b){
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = new Array(n + 1);
  for (let j = 0; j <= n; j++) dp[j] = j;
  for (let i = 1; i <= m; i++) {
    let prev = dp[0];
    dp[0] = i;
    for (let j = 1; j <= n; j++) {
      const tmp = dp[j];
      dp[j] = a[i - 1] === b[j - 1] ? prev : 1 + Math.min(prev, dp[j], dp[j - 1]);
      prev = tmp;
    }
  }
  return dp[n];
}

function maxTypoDistance(word){
  if (word.length <= 5) return 1;
  if (word.length <= 10) return 2;
  return 3;
}

// Cherche "keyword" (mot ou expression) dans "text" en tolérant quelques
// fautes de frappe. Compare le mot-clé à chaque fenêtre de mots de même
// longueur dans le texte (ex: "ecologi" comparé à "ecologie" → distance 1 → OK).
function fuzzyIncludes(text, keyword){
  if (text.includes(keyword)) return true;
  const kwWords = keyword.split(' ').filter(Boolean);
  const textWords = text.split(/\s+/).filter(Boolean);
  const windowSize = kwWords.length;
  for (let i = 0; i <= textWords.length - windowSize; i++) {
    const windowStr = textWords.slice(i, i + windowSize).join(' ');
    if (levenshtein(windowStr, keyword) <= maxTypoDistance(keyword)) return true;
  }
  return false;
}

function findDocTheme(t){
  return THEMES_DOC.find(theme => theme.match.some(k => fuzzyIncludes(t, k))) || null;
}

function findFictionGenre(t){
  return GENRES_FICTION.find(genre => genre.match.some(k => fuzzyIncludes(t, k))) || null;
}

// Construit une suggestion de mots-clés / équation booléenne à tester dans le
// cartouche de recherche. Ce n'est qu'une PROPOSITION indicative (le chatbot
// n'a pas accès au contenu réel du fonds) basée sur le principe d'indexation
// par descripteurs (type Motbis, utilisé par BCDI/e-sidoc).
// Accroche une relance à une réponse "terminale" (qui ne posait pas déjà de
// question) : on ne laisse jamais l'élève sans savoir s'il peut continuer.
// On retire le bouton "Retour au menu" basique pour le remplacer par une
// formulation plus engageante, tout en gardant les boutons d'action utiles.
function withFollowUp(resp){
  const kept = (resp.next || []).filter(item => item.intent !== 'menu');
  return {
    text: resp.text + `<br><br>Est-ce que ça répond à ta recherche, ou tu voulais autre chose ? Je peux continuer à t'aider 😊`,
    next: [
      ...kept,
      { label: '✅ Oui, ça me suffit !',      intent: 'merci' },
      { label: '🔍 Je cherche autre chose',  intent: 'menu' },
    ]
  };
}

function buildKeywordSuggestion(motbis){
  if (!motbis || motbis.length === 0) return '';
  if (motbis.length === 1) {
    return `<strong>${motbis[0]}</strong>`;
  }
  const orPart = motbis.slice(0, 2).join(' OU ');
  let html = `<strong>${orPart}</strong> <span style="font-size:11px;color:#6B6877;">(OU = élargit aux synonymes/notions proches, pour ne rien manquer)</span>`;
  if (motbis.length > 2) {
    html += `<br><strong>${motbis[0]} ET ${motbis[2]}</strong> <span style="font-size:11px;color:#6B6877;">(ET = croise deux notions, pour préciser si trop de résultats)</span>`;
  }
  return html;
}

function buildKeywordReveal(motbis){

    next: [

}

function buildGenreAnswer(genre, format){
  const coteLine = format === 'bd'
    ? `Cote : <strong>BD</strong> + 3 lettres de l'auteur.<br>`
    : format === 'roman'

    text: `📚 Pour du <strong>${genre.label}</strong> :<br>${coteLine}Le genre n'apparaît pas dans la cote (seulement l'auteur), donc le plus simple :<br>` +

    ]
  });
}

// ── INTENT MATCHING ──────────────────────────────────────────────────────────

function normalize(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

// ── MOT-CLÉ NON RECONNU : ON GUIDE PLUTÔT QUE DE DIRE "JE N'AI PAS COMPRIS" ──
// Public 10-15 ans : peu de réflexe pour reformuler seul. Plutôt que le
// fallback générique, on transforme le mot tapé en question à choix simple.

function truncateWord(raw){
  const w = raw.trim();
  return w.length > 40 ? w.slice(0, 40) + '…' : w;
}

function buildUnknownKeywordClarify(raw){
  const word = escapeHtml(truncateWord(raw));
  return {
    text: `Je ne connais pas de réponse toute prête sur <strong>« ${word} »</strong>, mais on va trouver ça ensemble ! 🔎<br><br>Tu cherches plutôt :`,
    next: [
      { label: '💡 Des infos rapides',     action: () => buildUnknownInfoAnswer(word) },
      { label: '📚 Un documentaire',       action: () => buildUnknownDocClarify(word) },
      { label: '📖 Un roman ou une BD',    action: () => buildUnknownFictionAnswer(word) },
      { label: '🤷 Autre chose',           intent: 'menu' },
    ]
  };
}

function buildUnknownInfoAnswer(word){
  return withFollowUp({
    text: `Pour une vue d'ensemble rapide sur <strong>« ${word} »</strong> :<br>` +
      `• Regarde les <strong>dictionnaires/encyclopédies en ligne</strong><br>` +
      `• Ou tape <strong>« ${word} »</strong> directement dans la recherche du catalogue pour voir tout ce que le CDI a sur ce sujet`,
    next: [
      { label: '📖 Dictionnaires en ligne', intent: 'dicos_en_ligne' },
      { label: '🎯 Recherche avancée',      intent: 'recherche_avancee' },
    ]
  });
}

function buildUnknownDocClarify(word){
  return {
    text: `Pas de souci ! Pour te donner une piste de rayon, ça rentre dans quel domaine selon toi ?`,
    next: [
      { label: '🔬 Sciences & nature',      action: () => buildUnknownDocDomainAnswer(word, '500') },
      { label: '🏺 Histoire & géographie',  action: () => buildUnknownDocDomainAnswer(word, '900') },
      { label: '👥 Société & métiers',      action: () => buildUnknownDocDomainAnswer(word, '300') },
      { label: '🎨 Arts, sport & loisirs',  action: () => buildUnknownDocDomainAnswer(word, '700') },
      { label: '💻 Techno & informatique',  action: () => buildUnknownDocDomainAnswer(word, '000') },
      { label: '🙏 Religions & mythologie', action: () => buildUnknownDocDomainAnswer(word, '200') },
      { label: '🤷 Je ne sais pas',         intent: 'cotes_documentaires' },
    ]
  };
}

function buildUnknownDocDomainAnswer(word, code){
  const domainLabel = domainForCode(code);
  return withFollowUp({
    text: `📚 Direction le rayon coté <strong>${code}</strong> (${domainLabel}) pour chercher un documentaire sur <strong>« ${word} »</strong> ! ⚠️ C'est une piste de départ — confirme en tapant <strong>« ${word} »</strong> dans la recherche du catalogue (filtre Documentaire).`,
    next: [
      { label: '🎯 Recherche avancée',           intent: 'recherche_avancee' },
      { label: '🔬 Voir toutes les cotes Dewey', intent: 'cotes_documentaires' },
    ]
  });
}

function buildUnknownFictionAnswer(word){
  return withFollowUp({
    text: `📖 Les romans et BD sont rangés par <strong>auteur</strong>, pas par thème — donc impossible de te donner une cote précise pour <strong>« ${word} »</strong>.<br><br>` +
      `Le plus simple : tape <strong>« ${word} »</strong> dans la recherche du catalogue (filtre Roman ou BD), le mot-clé sujet fera le travail !`,
    next: [
      { label: '🎯 Recherche avancée',            intent: 'recherche_avancee' },
      { label: '📚 Comprendre les cotes fiction', intent: 'cotes_fiction' },
    ]
  });
}

// ── TÂCHES SCOLAIRES FLOUES : ON GUIDE PAR QUESTIONS SUCCESSIVES ────────────
// "Je dois faire un exposé" / "je dois lire un livre" → on cerne le besoin
// avant de pouvoir aider, comme le ferait un professeur documentaliste.

const TASK_EXPOSE_TRIGGERS  = ['expose', 'presentation orale', 'dossier sur', 'recherche scolaire', 'devoir sur'];
const TASK_LECTURE_TRIGGERS = ['dois lire', 'livre a lire', 'lecture obligatoire', 'lire un livre', 'choisir un livre', 'livre pour les vacances'];

function buildExposeAsk(){
  pendingContext = 'expose';
  return {
    text: `Ah, super programme ça ! 📋 Un exposé sur quel sujet ?`,
    next: [{ label: '⬅️ Retour au menu', intent: 'menu' }]
  };
}

function buildLectureAsk(){
  pendingContext = 'lecture';
  return {
    text: `Chouette ! 📖 Tu as déjà un genre en tête (policier, fantastique, aventure...), ou je t'aide à choisir ?`,
    next: [
      { label: '⭐ Aide-moi à choisir',  intent: 'coups_de_coeur' },
      { label: '⬅️ Retour au menu',     intent: 'menu' },
    ]
  };
}

// ── PROPOS HORS SUJET / INAPPROPRIÉS ─────────────────────────────────────────
// Public 10-15 ans : on recadre toujours avec bienveillance, sans moraliser,
// et on ramène vite vers ce que le chatbot sait faire.

const INAPPROPRIATE_TRIGGERS = ['caca', 'pipi', 'prout', 'fesses', 'merde', 'peter', 'roter', 'connard', 'pute', 'nique'];

function containsWord(t, word){
  return new RegExp(`\\b${word}\\b`).test(t);
}

function isInappropriate(t){
  return INAPPROPRIATE_TRIGGERS.some(w => containsWord(t, w));
}

function buildInappropriateRedirect(){
  return {
    text: `Hmm, ça n'a pas trop sa place dans cette discussion 😅 Si tu as besoin d'aller aux toilettes ou d'autre chose, demande directement à un adulte du collège.<br><br>Moi je suis plutôt là pour t'aider à trouver des livres ou des infos au CDI ! Tu cherches une lecture, ou des infos sur un sujet ?`,
    next: MAIN_MENU
  };
}

function matchIntent(raw){
  const t = normalize(raw);
  if (!t) return 'fallback';

  // Propos inapproprié → recadrage bienveillant, prioritaire sur tout le reste
  if (isInappropriate(t)) { pendingContext = null; return buildInappropriateRedirect(); }

  // Réponse à une question contextuelle posée juste avant (exposé / lecture)
  if (pendingContext === 'expose') {
    pendingContext = null;
    const theme = findDocTheme(t);
    if (theme) return buildThemeDocAnswer(theme);
    return buildUnknownDocClarify(escapeHtml(truncateWord(raw)));
  }
  if (pendingContext === 'lecture') {
    pendingContext = null;
    const genre = findFictionGenre(t);
    if (genre) return buildFictionGenreResponse(genre);
    return buildUnknownFictionAnswer(escapeHtml(truncateWord(raw)));
  }

  // Salutations
  if (['bonjour','salut','coucou','hello','bonsoir','hey','bjr','slt'].some(k => t.includes(k))) return 'salutation';

  // Remerciements
  if (['merci','super','parfait','genial','top','nickel','cool','thanks'].some(k => t.includes(k))) return 'merci';

  // Menu
  if (t === 'menu' || t === 'retour' || t === 'accueil') return 'menu';

  // Tâche scolaire floue : exposé/devoir, sujet pas encore précisé (ou déjà
  // donné dans le même message, ex : "je dois faire un exposé sur l'écologie")
  if (TASK_EXPOSE_TRIGGERS.some(k => t.includes(k))) {
    const theme = findDocTheme(t);
    if (theme) return buildThemeDocAnswer(theme);
    return buildExposeAsk();
  }

  // Tâche scolaire floue : lecture obligatoire, genre pas encore précisé
  if (TASK_LECTURE_TRIGGERS.some(k => t.includes(k))) {
    const genre = findFictionGenre(t);
    if (genre) return buildFictionGenreResponse(genre);
    return buildLectureAsk();
  }

  // Thème documentaire détecté → réponse guidée avec cote Dewey + mots-clés
  const docTheme = findDocTheme(t);
  if (docTheme) return buildThemeDocResponse(docTheme);

  // Genre de fiction détecté → réponse guidée vers la bonne section
  const ficGenre = findFictionGenre(t);
  if (ficGenre) return buildFictionGenreResponse(ficGenre);

  // Recherche
  if (t.includes('avancee') || (t.includes('avance') && t.includes('recherch'))) return 'recherche_avancee';
  if (t.includes('recherch') && t.includes('simple')) return 'recherche_simple';
  if (t.includes('affiner') || t.includes('filtrer') || t.includes('trop de result')) return 'affiner_recherche';
  if (t.includes('recherch') || t.includes('cherch') || t.includes('trouver')) {
    // Plus de précision ?
    if (['manga','bd','bande dessinee','comics'].some(k => t.includes(k))) return 'mangas';
    if (['roman','livre','bouquin'].some(k => t.includes(k))) return 'disponibilite';
    if (['magazine','revue','journal','presse'].some(k => t.includes(k))) return 'revues_magazines';
    if (['internet','site','web','numerique','en ligne'].some(k => t.includes(k))) return 'ressources_en_ligne';
    return 'recherche_choix';
  }

  // Cotes / classement
  if (['cote','cotes','classement','rangement','classification','etiquette','dewey','classer'].some(k => t.includes(k))) return 'cotes_general';
  if (['fiction','roman','histoire','conte','poesie','theatre','nouvelle'].some(k => t.includes(k)) && !t.includes('recherch')) return 'cotes_fiction';

  // Manga / BD
  if (['manga','bd','bande dessinee','comics','anime','otaku'].some(k => t.includes(k))) return 'mangas';

  // Ressources numériques
  if (['ecouter','audio','livre audio','podcast'].some(k => t.includes(k))) return 'livres_ecouter';
  if (['diction','encyclop','usuel','larousse','robert'].some(k => t.includes(k))) return 'dicos_en_ligne';
  if (['image','video','illustration','photo'].some(k => t.includes(k))) return 'images_videos';
  if (['numerique','en ligne','internet','site','web','ressource'].some(k => t.includes(k))) return 'ressources_en_ligne';
  if (['bibliotheque','biblio'].some(k => t.includes(k))) return 'biblio_num';

  // Découvrir le fonds
  if (['decouvrir','parcourir','explorer','voir','catalogue'].some(k => t.includes(k))) return 'decouvrir_fonds';
  if (['magazine','revue','journal','presse','okapi','geo ado','wapiti'].some(k => t.includes(k))) return 'revues_magazines';
  if (['documentaire','doc'].some(k => t.includes(k))) return 'cotes_documentaires';

  // Infos pratiques
  if (['horaire','heure','ouverture','fermeture','quand'].some(k => t.includes(k))) return 'horaires';
  if (['pret','emprunt','emprunter','rendre','reserver','reservation','exemplaire','disponible'].some(k => t.includes(k))) return 'conditions_pret';
  if (['regle','vie','comportement'].some(k => t.includes(k))) return 'regles_vie';
  if (['suggestion','achat','commander','proposer'].some(k => t.includes(k))) return 'suggestions_achat';
  if (['prof','documentaliste','prof doc','prof-doc','enseignant'].some(k => t.includes(k))) return 'prof_doc';
  if (['info','infos','pratique','cdi'].some(k => t.includes(k))) return 'infos_pratiques';

  // Compte
  if (['compte','mon compte','mes prets','mes reservations','identifiant','connexion'].some(k => t.includes(k))) return 'mon_compte';

  // Apprendre
  if (['source','citer','citation','bibliographie'].some(k => t.includes(k))) return 'apprendre_sources';
  if (['emi','education aux medias','information'].some(k => t.includes(k))) return 'apprendre_emi';
  if (['apprendre','formation','tutoriel','aide'].some(k => t.includes(k))) return 'apprendre';

  // Orientation / santé
  if (['orientation','metier','avenir','onisep','lycee'].some(k => t.includes(k))) return 'orientation';

  // Activités
  if (['babelio','defi'].some(k => t.includes(k))) return 'defis_babelio';
  if (['coup de coeur','recommand','conseil','suggestion lecture'].some(k => t.includes(k))) return 'coups_de_coeur';

  // Disponibilité d'un titre
  if (['avez vous','y a t il','existe t il','avez-vous','ce livre','tel livre','disponible','pas au cdi'].some(k => t.includes(k))) return 'disponibilite';

  return buildUnknownKeywordClarify(raw);
}

// ── MOTEUR D'AFFICHAGE ────────────────────────────────────────────────────────

function formatText(text){
  // Markdown bold et sauts de ligne — les liens HTML restent tels quels
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const messagesEl    = document.getElementById('chat-messages');
const quickRepliesEl = document.getElementById('quick-replies');
const chatForm      = document.getElementById('chat-form');
const chatInput     = document.getElementById('chat-input');
const raf = (typeof window !== 'undefined' && window.requestAnimationFrame)
  ? window.requestAnimationFrame.bind(window)
  : (cb) => setTimeout(cb, 0);

function appendMessage(sender, html){
  const div = document.createElement('div');
  div.className = `message ${sender}`;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'message bot typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping(){
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function setQuickReplies(list){
  quickRepliesEl.innerHTML = '';
  (list || []).forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'quick-reply';
    btn.textContent = item.label;
    btn.addEventListener('click', () => {
      quickRepliesEl.innerHTML = '';
      appendMessage('user', escapeHtml(item.label));
      // Un clic sur une bulle structure la suite : on abandonne toute question
      // ouverte en attente de réponse libre (exposé/lecture).
      pendingContext = null;
      // item.action : étape suivante construite dynamiquement (guidage thématique
      // progressif). item.intent : clé statique classique dans RESPONSES.
      respond(typeof item.action === 'function' ? item.action() : item.intent);
    });
    quickRepliesEl.appendChild(btn);
  });
  // Les réponses rapides peuvent occuper plusieurs lignes et réduire la hauteur
  // visible de la zone de messages (elle est en flex:1, les bulles en taille
  // fixe) : on attend le rendu réel (rAF) puis on re-scroll, sinon le bas du
  // dernier message reste caché derrière/au-dessus des bulles.
  raf(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function respond(intentOrData){
  // intentOrData est soit une clé texte vers RESPONSES (boutons de réponse rapide,
  // intents classiques), soit un objet {text, next} déjà construit dynamiquement
  // (ex : guidage thématique basé sur la saisie libre de l'élève).
  const r = (typeof intentOrData === 'object' && intentOrData !== null)
    ? intentOrData
    : (RESPONSES[intentOrData] || RESPONSES.fallback);
  showTyping();
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const delay = reduceMotion ? 0 : 480;
  setTimeout(() => {
    hideTyping();
    appendMessage('bot', formatText(r.text));
    setQuickReplies(r.next);
  }, delay);
}

function sendMessage(){
  const value = chatInput.value.trim();
  if (!value) return;
  appendMessage('user', escapeHtml(value));
  chatInput.value = '';
  quickRepliesEl.innerHTML = '';
  respond(matchIntent(value));
}

// On n'utilise PAS l'événement "submit" du formulaire : certains environnements
// (iframes sandboxées, aperçus d'artefacts...) bloquent la soumission native des
// formulaires par sécurité. On gère donc l'envoi via le clic sur le bouton et la
// touche Entrée dans le champ de texte, ce qui fonctionne partout.
const chatSendBtn = document.getElementById('chat-send');
chatSendBtn.addEventListener('click', (e) => {
  e.preventDefault();
  sendMessage();
});
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
  }
});
// Garde-fou : si jamais le formulaire est tout de même soumis (Enter capté par
// le navigateur avant notre listener, autocomplete, etc.), on bloque la
// navigation et on délègue à sendMessage() pour éviter tout rechargement de page.
chatForm.addEventListener('submit', (e) => {
  e.preventDefault();
  sendMessage();
});

// Message d'accueil
appendMessage('bot', formatText(RESPONSES.intro.text));
setQuickReplies(RESPONSES.intro.next);
</script>
